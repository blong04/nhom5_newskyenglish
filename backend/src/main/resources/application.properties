# ==========================================
# NewSky English - Application Properties
# ==========================================

# Server
server.port=8080

# ==========================================
# Aiven MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://newskyenglish-long0961511354-57ba.j.aivencloud.com:20649/defaultdb?sslMode=REQUIRED&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Connection Pool
# ==========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# Jackson JSON
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ==========================================
# Logging
# ==========================================
logging.level.com.newskyenglish=DEBUG
logging.level.org.springframework.web=INFO